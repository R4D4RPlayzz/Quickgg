<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickGG Games</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #05070f;
      color: #f5f7ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.05), transparent 18%),
                  radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.08), transparent 20%),
                  linear-gradient(180deg, #0b1220 0%, #05070f 100%);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 100% 32px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      padding: 3rem 1.5rem 4rem;
      max-width: 1240px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
      margin-bottom: 2rem;
    }

    .hero {
      flex: 1 1 480px;
      min-width: 280px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.8rem, 6vw, 4.8rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
      color: #eef2ff;
    }

    .hero p {
      margin: 1.35rem 0 0;
      color: rgba(245, 247, 255, 0.78);
      max-width: 760px;
      line-height: 1.8;
      font-size: 1rem;
    }

    .stats {
      display: grid;
      gap: 1rem;
      width: min(360px, 100%);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .stat strong {
      font-size: 1.5rem;
      color: #f8fbff;
    }

    .stat span {
      color: rgba(245, 247, 255, 0.7);
      font-size: 0.96rem;
    }

    .search-bar {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-bar input {
      flex: 1;
      min-width: 220px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 0.95rem 1.1rem;
      background: rgba(255, 255, 255, 0.04);
      color: #eef2ff;
      font-size: 1rem;
      outline: none;
    }

    .search-bar input::placeholder {
      color: rgba(245, 247, 255, 0.5);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .card {
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      min-height: 100%;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.28);
      border-color: rgba(59, 130, 246, 0.45);
    }

    .card:active {
      transform: translateY(-8px) scale(0.98);
    }

    @keyframes pulse-click {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .card.clicked {
      animation: pulse-click 0.3s ease-in-out;
    }

    .card-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 1rem;
      position: relative;
      overflow: hidden;
      color: white;
      background-size: cover;
      background-position: center;
    }

    .card-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(5, 7, 17, 0.88) 100%);
      pointer-events: none;
    }

    .card-thumb {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 1;
      filter: none;
    }

    .card-image-label {
      position: relative;
      z-index: 1;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 16px 32px rgba(0, 0, 0, 0.35);
      max-width: 80%;
    }

    .card-content {
      padding: 1.35rem 1.35rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .card-title {
      margin: 0;
      font-size: 1.2rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .card-meta {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .tag {
      padding: 0.45rem 0.75rem;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.14);
      color: #dbeafe;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .card-description {
      margin: 0;
      color: rgba(245, 247, 255, 0.75);
      line-height: 1.6;
      font-size: 0.96rem;
    }

    .card-link {
      margin-top: auto;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: #7dd3fc;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.82rem;
    }

    .card-link svg {
      width: 1rem;
      height: 1rem;
      fill: currentColor;
    }

    @media (max-width: 720px) {
      .header {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="hero">
        <h1>QuickGG Games</h1>
        <p>Play the best unblocked games. Click any game to start playing instantly.</p>
        <div class="search-bar">
          <input id="searchInput" type="search" placeholder="Search games by name" aria-label="Search games" />
        </div>
      </div>
      <div class="stats">
        <div class="stat">
          <strong>11</strong>
          <span>Available games</span>
        </div>
        <div class="stat">
          <strong>Working</strong>
          <span>All links verified and active</span>
        </div>
        <div class="stat">
          <strong>Searchable</strong>
          <span>Find and play your favorite games</span>
        </div>
      </div>
    </div>

    <section class="grid" id="gameGrid"></section>
  </div>

  <script>
    const games = [
      { title: 'Jumping Shell', url: 'https://jumpingshellgame.github.io/', image: 'https://source.unsplash.com/800x450/?sea-shell', category: 'Arcade', desc: 'Jump to avoid obstacles and survive.' },
      { title: 'Cookie Clicker', url: 'https://sites.google.com/site/unblockedwtf/cookie-clicker', image: 'https://source.unsplash.com/800x450/?cookie', category: 'Clicker', desc: 'Click cookies and build your empire.' },
      { title: 'Drive Mad', url: 'https://sites.google.com/view/games-az/drive-mad', image: 'https://source.unsplash.com/800x450/?monster-truck', category: 'Racing', desc: 'Drive through insane stunt courses.' },
      { title: 'Rooftop Snipers', url: 'https://sites.google.com/view/classroom6x/rooftop-snipers', image: 'https://source.unsplash.com/800x450/?sniper', category: 'Shooter', desc: 'Snipe opponents from rooftops.' },
      { title: 'Tiny Fishing', url: 'https://sites.google.com/site/unblockedwtf/tiny-fishing', image: 'https://source.unsplash.com/800x450/?fishing', category: 'Fishing', desc: 'Cast your line and reel in huge fish.' },
      { title: 'Moto X3M', url: 'https://sites.google.com/view/classroom6x/moto-x3m', image: 'https://source.unsplash.com/800x450/?motorcycle', category: 'Bike', desc: 'Complete insane stunt tracks without crashing.' },
      { title: '1v1.LOL', url: 'https://sites.google.com/view/classroom6x/1v1-lol', image: 'https://source.unsplash.com/800x450/?duel', category: 'Shooter', desc: 'Build fast and battle to be the last one standing.' },
      { title: 'Snow Rider 3D', url: 'https://sites.google.com/view/classroom6x/snow-rider-3d', image: 'https://source.unsplash.com/800x450/?snow-sports', category: 'Racing', desc: 'Ride through snowy mountain slopes.' },
      { title: 'Subway Surfers', url: 'https://sites.google.com/view/unblockedgames410/subway-surfers', image: 'https://source.unsplash.com/800x450/?subway', category: 'Runner', desc: 'Dash through trains and collect coins.' },
      { title: 'Fruit Merge', url: 'https://www.cbc.ca/kids/games/all/fruit-merge', image: 'https://source.unsplash.com/800x450/?fruit', category: 'Puzzle', desc: 'Merge matching fruits to progress.' },
      { title: 'Archer Ragdoll', url: 'https://sites.google.com/view/classroom6x/archer-ragdoll', image: 'https://source.unsplash.com/800x450/?archery', category: 'Action', desc: 'Shoot arrows at ragdoll targets and complete challenges.' }
    ];

    const grid = document.getElementById('gameGrid');
    const searchInput = document.getElementById('searchInput');

    function buildCard(game) {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = game.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.innerHTML = `
        <div class="card-image">
          <img class="card-thumb" src="${game.image}" alt="${game.title} preview" />
        </div>
        <div class="card-content">
          <h2 class="card-title">${game.title}</h2>
          <div class="card-meta">
            <span class="tag">${game.category}</span>
          </div>
          <p class="card-description">${game.desc}</p>
          <span class="card-link">Play now
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17l5-5-5-5v10z"/></svg>
          </span>
        </div>
      `;
      card.addEventListener('click', () => {
        card.classList.add('clicked');
        setTimeout(() => card.classList.remove('clicked'), 300);
      });
      return card;
    }

    function renderGames(filter = '') {
      const query = filter.trim().toLowerCase();
      grid.innerHTML = '';
      const filtered = games.filter(game => game.title.toLowerCase().includes(query));

      if (!filtered.length) {
        const empty = document.createElement('div');
        empty.textContent = 'No games found. Try another search phrase.';
        empty.style.gridColumn = '1 / -1';
        empty.style.padding = '2rem';
        empty.style.color = 'rgba(245, 247, 255, 0.66)';
        empty.style.textAlign = 'center';
        empty.style.background = 'rgba(255,255,255,0.03)';
        empty.style.borderRadius = '22px';
        grid.appendChild(empty);
        return;
      }

      filtered.forEach(game => grid.appendChild(buildCard(game)));
    }

    searchInput.addEventListener('input', () => renderGames(searchInput.value));
    renderGames();
  </script>
</body>
</html>
