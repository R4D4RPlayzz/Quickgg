<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickGG Games</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #05070f;
      color: #f5f7ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.05), transparent 18%),
                  radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.08), transparent 20%),
                  linear-gradient(180deg, #0b1220 0%, #05070f 100%);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 100% 32px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      padding: 3rem 1.5rem 4rem;
      max-width: 1240px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-bottom: 0;
      padding: 2rem 0 1rem;
    }

    .brand img {
      width: min(960px, 100%);
      height: auto;
      max-height: 420px;
      object-fit: contain;
      border-radius: 24px;
      background: transparent;
      border: none;
      padding: 0;
      box-shadow: none;
    }

    .hero {
      flex: 1 1 480px;
      min-width: 280px;
    }

    .search-bar {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-bar {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-bar input {
      flex: 1;
      min-width: 220px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 0.95rem 1.1rem;
      background: rgba(255, 255, 255, 0.04);
      color: #eef2ff;
      font-size: 1rem;
      outline: none;
    }

    .search-bar input::placeholder {
      color: rgba(245, 247, 255, 0.5);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .card {
      display: flex;
      flex-direction: column;
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(96, 165, 250, 0.16);
      border-radius: 32px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
      min-height: 100%;
      backdrop-filter: blur(18px);
    }

    .card:hover {
      transform: translateY(-12px) scale(1.01);
      box-shadow: 0 32px 80px rgba(56, 189, 248, 0.24), inset 0 0 0 1px rgba(59, 130, 246, 0.16);
      border-color: rgba(96, 165, 250, 0.45);
    }

    .card:active {
      transform: translateY(-8px) scale(0.99);
    }

    @keyframes pulse-click {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .card.clicked {
      animation: pulse-click 0.3s ease-in-out;
    }

    .card-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      background: #0f172a;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .card-image::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.22), transparent 40%);
      pointer-events: none;
    }

    .card-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.1) 0%, rgba(15, 23, 42, 0.9) 100%);
      pointer-events: none;
    }

    .card-thumb {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.05) contrast(1.05);
    }

    .card-top-badge {
      position: relative;
      z-index: 1;
      margin: 1rem;
      padding: 0.5rem 0.75rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.75);
      color: #e0f2fe;
      font-size: 0.83rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      backdrop-filter: blur(10px);
    }

    .card-image-label {
      position: relative;
      z-index: 1;
      margin: 1rem;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.2;
      color: #f8fbff;
      text-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
    }

    .card-content {
      padding: 1.35rem 1.35rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .card-top {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      margin: 0;
      font-size: 1.3rem;
      line-height: 1.18;
      letter-spacing: -0.02em;
    }

    .card-meta {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .tag {
      padding: 0.55rem 0.95rem;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.18);
      color: #dbeafe;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .card-description {
      margin: 0;
      color: rgba(245, 247, 255, 0.82);
      line-height: 1.7;
      font-size: 0.96rem;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 1rem;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.12);
      color: #7dd3fc;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.82rem;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .card-link:hover {
      background: rgba(59, 130, 246, 0.2);
      transform: translateY(-1px);
    }

    .card-link svg {
      width: 1rem;
      height: 1rem;
      fill: currentColor;
    }

    @media (max-width: 720px) {
      .header {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="brand">
        <img src="images/logo.png" alt="QuickGG logo" />
      </div>
      <div class="search-bar">
        <input id="searchInput" type="search" placeholder="Search games by name" aria-label="Search games" />
      </div>
    </div>

    <section class="grid" id="gameGrid"></section>
  </div>

  <script>
    const games = [
      { title: 'Jumping Shell', url: 'https://jumpingshellgame.github.io/', image: 'images/0d1e0194-e649-47d0-a0d5-719441df832f.jpg', category: 'Arcade', desc: 'Jump to avoid obstacles and survive.' },
      { title: 'Cookie Clicker', url: 'https://sites.google.com/site/unblockedwtf/cookie-clicker', image: 'images/e03e0420-49b6-4c50-aa28-764d31d1c773.jpg', category: 'Clicker', desc: 'Click cookies and build your empire.' },
      { title: 'Drive Mad', url: 'https://sites.google.com/view/games-az/drive-mad', image: 'images/d069fee0-c598-46cf-b53b-4ed0373eb510.jpg', category: 'Racing', desc: 'Drive through insane stunt courses.' },
      { title: 'Rooftop Snipers', url: 'https://sites.google.com/view/classroom6x/rooftop-snipers', image: 'images/b2066b7f-2870-46a8-800e-1ccc1769e4b5.jpg', category: 'Shooter', desc: 'Snipe opponents from rooftops.' },
      { title: 'Tiny Fishing', url: 'https://sites.google.com/site/unblockedwtf/tiny-fishing', image: 'images/3ac6d22e-fb74-4497-aa76-45840a69568f.jpg', category: 'Fishing', desc: 'Cast your line and reel in huge fish.' },
      { title: 'Moto X3M', url: 'https://sites.google.com/view/classroom6x/moto-x3m', image: 'images/d9e7a556-d13a-4e51-8e86-c76e534bd8df.jpg', category: 'Bike', desc: 'Complete insane stunt tracks without crashing.' },
      { title: '1v1.LOL', url: 'https://sites.google.com/view/classroom6x/1v1-lol', image: 'images/9e17897c-3780-497a-b6c2-7e6bec76dba3.jpg', category: 'Shooter', desc: 'Build fast and battle to be the last one standing.' },
      { title: 'Snow Rider 3D', url: 'https://sites.google.com/view/classroom6x/snow-rider-3d', image: 'images/8f5360c1-db07-440f-abda-369637571a2f.jpg', category: 'Racing', desc: 'Ride through snowy mountain slopes.' },
      { title: 'Subway Surfers', url: 'https://sites.google.com/view/unblockedgames410/subway-surfers', image: 'images/65069f88-57b1-4974-af07-06942258963e.jpg', category: 'Runner', desc: 'Dash through trains and collect coins.' },
      { title: 'Fruit Merge', url: 'https://www.cbc.ca/kids/games/all/fruit-merge', image: 'images/d6b6dc11-246b-41c0-ac7a-a3a6732dc603.jpg', category: 'Puzzle', desc: 'Merge matching fruits to progress.' },
      { title: 'Archer Ragdoll', url: 'https://sites.google.com/view/classroom6x/archer-ragdoll', image: 'images/fa9cf099-82e1-42f4-a0ec-1b065a0d78b0.jpg', category: 'Action', desc: 'Shoot arrows at ragdoll targets and complete challenges.' }
    ];

    const grid = document.getElementById('gameGrid');
    const searchInput = document.getElementById('searchInput');

    function buildCard(game) {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = game.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.innerHTML = `
        <div class="card-image">
          <img class="card-thumb" src="${game.image}" alt="${game.title} preview" />
          <span class="card-top-badge">${game.category}</span>
        </div>
        <div class="card-content">
          <div class="card-top">
            <h2 class="card-title">${game.title}</h2>
          </div>
          <p class="card-description">${game.desc}</p>
          <div class="card-footer">
            <span class="card-link">Play now
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17l5-5-5-5v10z"/></svg>
            </span>
          </div>
        </div>
      `;
      card.addEventListener('click', () => {
        card.classList.add('clicked');
        setTimeout(() => card.classList.remove('clicked'), 300);
      });
      return card;
    }

    function renderGames(filter = '') {
      const query = filter.trim().toLowerCase();
      grid.innerHTML = '';
      const filtered = games.filter(game => game.title.toLowerCase().includes(query));

      if (!filtered.length) {
        const empty = document.createElement('div');
        empty.textContent = 'No games found. Try another search phrase.';
        empty.style.gridColumn = '1 / -1';
        empty.style.padding = '2rem';
        empty.style.color = 'rgba(245, 247, 255, 0.66)';
        empty.style.textAlign = 'center';
        empty.style.background = 'rgba(255,255,255,0.03)';
        empty.style.borderRadius = '22px';
        grid.appendChild(empty);
        return;
      }

      filtered.forEach(game => grid.appendChild(buildCard(game)));
    }

    searchInput.addEventListener('input', () => renderGames(searchInput.value));
    renderGames();
  </script>
</body>
</html>
