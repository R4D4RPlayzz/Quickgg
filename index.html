<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickGG Unblocked Games</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #05070f;
      color: #f5f7ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.04), transparent 18%),
                  radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.08), transparent 20%),
                  linear-gradient(180deg, #0a0f1c 0%, #05070f 100%);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 100% 30px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      padding: 3rem 1.5rem 4rem;
      max-width: 1240px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
      margin-bottom: 2rem;
    }

    .hero {
      flex: 1 1 480px;
      min-width: 280px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.8rem, 6vw, 4.8rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
      color: #eef2ff;
    }

    .hero p {
      margin: 1.35rem 0 0;
      color: rgba(245, 247, 255, 0.78);
      max-width: 760px;
      line-height: 1.8;
      font-size: 1rem;
    }

    .stats {
      display: grid;
      gap: 1rem;
      width: min(360px, 100%);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .stat strong {
      font-size: 1.5rem;
      color: #f8fbff;
    }

    .stat span {
      color: rgba(245, 247, 255, 0.7);
      font-size: 0.96rem;
    }

    .search-bar {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-bar input {
      flex: 1;
      min-width: 220px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 0.95rem 1.1rem;
      background: rgba(255, 255, 255, 0.04);
      color: #eef2ff;
      font-size: 1rem;
      outline: none;
    }

    .search-bar input::placeholder {
      color: rgba(245, 247, 255, 0.5);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .card {
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      min-height: 100%;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.28);
      border-color: rgba(59, 130, 246, 0.45);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 1rem;
      position: relative;
      overflow: hidden;
      color: white;
      background-size: cover;
      background-position: center;
    }

    .card-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(5, 7, 17, 0.88) 100%);
      pointer-events: none;
    }

    .card-image-label {
      position: relative;
      z-index: 1;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 16px 32px rgba(0, 0, 0, 0.35);
      max-width: 80%;
    }

    .card-content {
      padding: 1.35rem 1.35rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .card-title {
      margin: 0;
      font-size: 1.2rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .card-meta {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .tag {
      padding: 0.45rem 0.75rem;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.14);
      color: #dbeafe;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .card-description {
      margin: 0;
      color: rgba(245, 247, 255, 0.75);
      line-height: 1.6;
      font-size: 0.96rem;
    }

    .card-link {
      margin-top: auto;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: #7dd3fc;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.82rem;
    }

    .card-link svg {
      width: 1rem;
      height: 1rem;
      fill: currentColor;
    }

    @media (max-width: 720px) {
      .header {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="hero">
        <h1>QuickGG Unblocked</h1>
        <p>Play real unblocked games instantly. Hover each card to preview it, then click to open the actual game page in a new tab.</p>
        <div class="search-bar">
          <input id="searchInput" type="search" placeholder="Search games by name" aria-label="Search games" />
        </div>
      </div>
      <div class="stats">
        <div class="stat">
          <strong>30</strong>
          <span>Real unblocked game links</span>
        </div>
        <div class="stat">
          <strong>Clickable</strong>
          <span>Open the game instantly</span>
        </div>
        <div class="stat">
          <strong>Works offline</strong>
          <span>Card visuals are local</span>
        </div>
      </div>
    </div>

    <section class="grid" id="gameGrid"></section>
  </div>

  <script>
    const games = [
      { title: 'Happy Wheels', url: 'https://unblockedgames76.com/happy-wheels/', color: '#ff5c79', category: 'Physics', desc: 'Race through insane obstacle courses in this classic ragdoll demolition game.' },
      { title: 'Tiny Fishing', url: 'https://unblockedgames76.com/tiny-fishing/', color: '#2dd4bf', category: 'Fishing', desc: 'Cast your line and catch the biggest fish in this relaxing arcade experience.' },
      { title: 'Slope', url: 'https://unblockedgames76.com/slope/', color: '#818cf8', category: 'Runner', desc: 'Speed down an endless slope while dodging gaps and obstacles.' },
      { title: 'Run 3', url: 'https://unblockedgames76.com/run-3/', color: '#38bdf8', category: 'Platform', desc: 'Explore tunnels and jump between drifting platforms in this fast-paced runner.' },
      { title: '1v1.LOL', url: 'https://unblockedgames76.com/1v1-lol/', color: '#f97316', category: 'Shooter', desc: 'Build, shoot, and win solo or with friends in this fast-building battle arena.' },
      { title: 'Krunker.io', url: 'https://krunker.io/', color: '#a855f7', category: 'FPS', desc: 'Jump into a browser-based shooter with pixel graphics and fast movement.' },
      { title: 'Shell Shockers', url: 'https://shellshock.io/', color: '#f59e0b', category: 'Shooter', desc: 'Egg-cellent multiplayer FPS action with quirky weapons and fast reflexes.' },
      { title: 'Agar.io', url: 'https://agar.io/', color: '#22c55e', category: 'IO', desc: 'Grow your cell, avoid predators, and dominate the agar arena.' },
      { title: 'Slither.io', url: 'https://slither.io/', color: '#0ea5e9', category: 'IO', desc: 'Survive as a snake, eat pellets, and trap other players.' },
      { title: 'Geometry Dash', url: 'https://unblockedgames76.com/geometry-dash/', color: '#f43f5e', category: 'Rhythm', desc: 'Tap through fast rhythm-based obstacles in this classic platformer.' },
      { title: 'Subway Surfers', url: 'https://unblockedgames76.com/subway-surfers/', color: '#fb7185', category: 'Runner', desc: 'Dash along subway tracks, dodge trains, and collect coins.' },
      { title: 'Temple Run 2', url: 'https://unblockedgames76.com/temple-run-2/', color: '#f97316', category: 'Runner', desc: 'Sprint away from the temple while avoiding traps and gaps.' },
      { title: 'Moto X3M', url: 'https://unblockedgames76.com/moto-x3m/', color: '#6366f1', category: 'Bike', desc: 'Race your motorcycle over extreme ramps, flips, and water hazards.' },
      { title: 'Tank Trouble', url: 'https://unblockedgames76.com/tank-trouble/', color: '#9333ea', category: 'Battle', desc: 'Drive a tank and blast opponents around a maze in this fun multiplayer game.' },
      { title: 'Bonk.io', url: 'https://unblockedgames76.com/bonk-io/', color: '#10b981', category: 'IO', desc: 'Push other players off the arena in this physics-based multiplayer battler.' },
      { title: 'Bloons Tower Defense 5', url: 'https://unblockedgames76.com/bloons-tower-defense-5/', color: '#f59e0b', category: 'Strategy', desc: 'Build monkey towers and stop the bloon invasion.' },
      { title: 'Paper.io 2', url: 'https://unblockedgames76.com/paper-io-2/', color: '#38bdf8', category: 'IO', desc: 'Claim territory and cut off opponents in this addictive io game.' },
      { title: 'Fireboy and Watergirl', url: 'https://unblockedgames76.com/fireboy-and-watergirl/', color: '#0ea5e9', category: 'Puzzle', desc: 'Solve cooperative temple puzzles with two characters.' },
      { title: 'Super Mario 63', url: 'https://unblockedgames76.com/super-mario-63/', color: '#ef4444', category: 'Adventure', desc: 'Play a fan-made Mario platformer with new power-ups and secrets.' },
      { title: 'Happy Wheels 2', url: 'https://unblockedgames76.com/happy-wheels-2/', color: '#f43f5e', category: 'Physics', desc: 'More insane obstacle courses and ragdoll vehicle wreckage.' },
      { title: 'Flappy Bird', url: 'https://unblockedgames76.com/flappy-bird/', color: '#fbbf24', category: 'Arcade', desc: 'Tap the bird through pipes in this iconic one-button game.' },
      { title: 'Stickman Hook', url: 'https://unblockedgames76.com/stickman-hook/', color: '#22c55e', category: 'Action', desc: 'Swing through tricky levels using ropes and momentum.' },
      { title: 'Vex 6', url: 'https://unblockedgames76.com/vex-6/', color: '#6366f1', category: 'Platform', desc: 'Master dangerous obstacle courses with precise jumps.' },
      { title: 'Super Smash Flash 2', url: 'https://unblockedgames76.com/super-smash-flash-2/', color: '#8b5cf6', category: 'Fighter', desc: 'Battle iconic characters in a fast-paced fan-made fighter.' },
      { title: 'Run 2', url: 'https://unblockedgames76.com/run-2/', color: '#e879f9', category: 'Runner', desc: 'Run and glide across floating platforms in this futuristic runner.' },
      { title: 'Raft Wars', url: 'https://unblockedgames76.com/raft-wars/', color: '#22d3ee', category: 'Shooter', desc: 'Fire cannons and defend your raft from enemy attacks.' },
      { title: 'Earn to Die 2', url: 'https://unblockedgames76.com/earn-to-die-2/', color: '#f97316', category: 'Action', desc: 'Drive through zombie hordes and upgrade your car to escape.' },
      { title: 'Basketball Stars', url: 'https://unblockedgames76.com/basketball-stars/', color: '#fb7185', category: 'Sports', desc: 'Compete in basketball duels with flashy shots and power moves.' },
      { title: 'Taco Bender', url: 'https://unblockedgames76.com/taco-bender/', color: '#facc15', category: 'Arcade', desc: 'Stack tacos and dodge falling ingredients in a food frenzy.' },
      { title: 'Snake.is', url: 'https://unblockedgames76.com/snake-is/', color: '#1d4ed8', category: 'Classic', desc: 'Eat pellets, grow longer, and outmaneuver opponents in arena battle.' }
    ];

    const grid = document.getElementById('gameGrid');
    const searchInput = document.getElementById('searchInput');

    function buildCard(game) {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = game.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.innerHTML = `
        <div class="card-image" style="background: linear-gradient(180deg, ${game.color} 0%, rgba(10, 10, 25, 0.9) 85%);">
          <div class="card-image-label">${game.title}</div>
        </div>
        <div class="card-content">
          <h2 class="card-title">${game.title}</h2>
          <div class="card-meta">
            <span class="tag">${game.category}</span>
          </div>
          <p class="card-description">${game.desc}</p>
          <span class="card-link">Play now
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17l5-5-5-5v10z"/></svg>
          </span>
        </div>
      `;
      return card;
    }

    function renderGames(filter = '') {
      const query = filter.trim().toLowerCase();
      grid.innerHTML = '';

      const filtered = games.filter(game => game.title.toLowerCase().includes(query));

      if (!filtered.length) {
        const empty = document.createElement('div');
        empty.textContent = 'No games found. Try another search phrase.';
        empty.style.gridColumn = '1 / -1';
        empty.style.padding = '2rem';
        empty.style.color = 'rgba(245, 247, 255, 0.66)';
        empty.style.textAlign = 'center';
        empty.style.background = 'rgba(255,255,255,0.03)';
        empty.style.borderRadius = '22px';
        grid.appendChild(empty);
        return;
      }

      filtered.forEach(game => grid.appendChild(buildCard(game)));
    }

    searchInput.addEventListener('input', () => renderGames(searchInput.value));
    renderGames();
  </script>
</body>
</html>
